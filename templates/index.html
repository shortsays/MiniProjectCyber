<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Phishing Detection Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #060d1a;
            --surface:  #0d1b2e;
            --border:   rgba(56, 189, 248, 0.12);
            --accent:   #38bdf8;
            --accent2:  #06b6d4;
            --danger:   #f87171;
            --warn:     #fb923c;
            --safe:     #34d399;
            --text:     #e2e8f0;
            --muted:    #64748b;
            --mono:     'JetBrains Mono', monospace;
            --sans:     'Syne', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            padding: 24px;
            overflow-x: hidden;
        }

        #bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 30% 40%, #001a2e 0%, #000510 50%, #000 100%);
            z-index: 0;
        }

        #c1 { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        #c2 { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
        #c3 { position: fixed; inset: 0; z-index: 3; pointer-events: none; }
        #c4 { position: fixed; inset: 0; z-index: 4; pointer-events: none; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header-left { display: flex; align-items: center; gap: 14px; }

        .shield-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            box-shadow: 0 0 20px rgba(56,189,248,0.3);
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        h1 span { color: var(--accent); }

        .live-badge {
            display: flex; align-items: center; gap: 8px;
            background: rgba(34, 197, 94, 0.08);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 12px;
            font-family: var(--mono);
            color: var(--safe);
            letter-spacing: 0.5px;
        }

        .pulse {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--safe);
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(52,211,153,0.4); }
            50%       { opacity: 0.6; box-shadow: 0 0 0 6px rgba(52,211,153,0); }
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        @media (max-width: 640px) { .stats { grid-template-columns: 1fr; } }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 24px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
        }

        .stat-card:hover { border-color: rgba(56,189,248,0.3); }

        .stat-label {
            font-size: 11px;
            font-family: var(--mono);
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            font-family: var(--mono);
        }

        .stat-card.danger .stat-value { color: var(--danger); }
        .stat-card.danger::after { background: linear-gradient(90deg, var(--danger), transparent); }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px;
        }

        .card-title {
            font-size: 13px;
            font-family: var(--mono);
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title::before {
            content: '';
            width: 3px; height: 14px;
            background: var(--accent);
            border-radius: 2px;
            display: inline-block;
        }

        .chart-wrap { position: relative; height: 260px; }

        .table-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 22px;
            margin-bottom: 24px;
        }

        .table-wrap {
            overflow-x: auto;
            max-height: 420px;
            overflow-y: auto;
        }

        .table-wrap::-webkit-scrollbar { width: 4px; height: 4px; }
        .table-wrap::-webkit-scrollbar-track { background: transparent; }
        .table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        table { width: 100%; border-collapse: collapse; }

        thead {
            position: sticky; top: 0;
            background: var(--surface);
            z-index: 5;
        }

        th {
            padding: 10px 14px;
            text-align: left;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        td {
            padding: 13px 14px;
            border-bottom: 1px solid rgba(51,65,85,0.2);
            font-size: 13px;
            vertical-align: middle;
        }

        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: rgba(56,189,248,0.04); }

        .td-time {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
        }

        .td-source {
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
        }

        .td-url {
            font-family: var(--mono);
            font-size: 12px;
            color: #94a3b8;
            word-break: break-all;
            max-width: 340px;
        }

        .badge {
            display: inline-block;
            font-family: var(--mono);
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            white-space: nowrap;
        }

        .badge-high   { background: rgba(248,113,113,0.12); color: var(--danger);  border: 1px solid rgba(248,113,113,0.25); }
        .badge-medium { background: rgba(251,146,60,0.12);  color: var(--warn);    border: 1px solid rgba(251,146,60,0.25); }
        .badge-low    { background: rgba(52,211,153,0.12);  color: var(--safe);    border: 1px solid rgba(52,211,153,0.25); }

        .empty {
            text-align: center;
            padding: 50px 20px;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 13px;
        }

        @keyframes rowIn {
            from { background: rgba(56,189,248,0.08); }
            to   { background: transparent; }
        }

        .row-new { animation: rowIn 1s ease-out forwards; }
    </style>
</head>
<body>
<div id="bg"></div>
<canvas id="c1"></canvas>
<canvas id="c2"></canvas>
<canvas id="c3"></canvas>
<canvas id="c4"></canvas>
<div class="container">

    <div class="header">
        <div class="header-left">
            <div class="shield-icon">🛡️</div>
            <h1>Phishing <span>Detection</span></h1>
        </div>
        <div class="live-badge">
            <div class="pulse"></div>
            LIVE MONITORING
        </div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-label">Total Detected</div>
            <div class="stat-value" id="totalCount">0</div>
        </div>
        <div class="stat-card danger">
            <div class="stat-label">High Confidence</div>
            <div class="stat-value" id="highCount">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Avg Confidence</div>
            <div class="stat-value" id="avgConf">0%</div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="card-title">Detection Trend</div>
            <div class="chart-wrap">
                <canvas id="lineChart"></canvas>
            </div>
        </div>
        <div class="card">
            <div class="card-title">Top Sources</div>
            <div class="chart-wrap">
                <canvas id="doughnutChart"></canvas>
            </div>
        </div>
    </div>

    <div class="table-card">
        <div class="card-title">Recent Detections</div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width:12%">Time</th>
                        <th style="width:15%">Source</th>
                        <th style="width:50%">URL</th>
                        <th style="width:13%">Confidence</th>
                    </tr>
                </thead>
                <tbody id="logTable">
                    <tr>
                        <td colspan="4" class="empty">Waiting for detections...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
let lineChart, doughnutChart;
let existing = new Set();
let allLogs = [];
const MAX_ROWS = 100;

function formatTime(ts) {
    if (!ts) return '—';

    if (!isNaN(ts)) {
        const ms = ts > 1e10 ? Number(ts) : Number(ts) * 1000;
        return new Date(ms).toLocaleTimeString('en-US', {
            hour: '2-digit', minute: '2-digit', second: '2-digit'
        });
    }

    const bracketMatch = ts.match(/\[(\d{2}:\d{2}:\d{2})\]/);
    if (bracketMatch) return bracketMatch[1];

    const timeOnly = ts.match(/(\d{2}:\d{2}:\d{2})/);
    if (timeOnly) return timeOnly[1];

    const date = new Date(ts.replace(' ', 'T'));
    if (!isNaN(date)) return date.toLocaleTimeString('en-US', {
        hour: '2-digit', minute: '2-digit', second: '2-digit'
    });

    return ts;
}

function badgeClass(conf) {
    const n = parseFloat(conf);
    const pct = n <= 1 ? n * 100 : n;
    if (pct >= 75) return 'badge-high';
    if (pct >= 50) return 'badge-medium';
    return 'badge-low';
}

function formatConf(conf) {
    const n = parseFloat(conf);
    return n <= 1 ? (n * 100).toFixed(0) + '%' : n.toFixed(0) + '%';
}

async function fetchLogs() {
    try {
        const res = await fetch('/api/logs');
        if (!res.ok) throw new Error('Network error');
        return await res.json();
    } catch (e) {
        console.error('Fetch error:', e);
        return [];
    }
}

function updateStats() {
    const total = allLogs.length;
    const high  = allLogs.filter(l => {
        const n = parseFloat(l[4]);
        return (n <= 1 ? n * 100 : n) >= 75;
    }).length;
    const avg = total
        ? (allLogs.reduce((s, l) => {
            const n = parseFloat(l[4]);
            return s + (n <= 1 ? n * 100 : n);
          }, 0) / total).toFixed(0)
        : 0;

    document.getElementById('totalCount').textContent = total;
    document.getElementById('highCount').textContent  = high;
    document.getElementById('avgConf').textContent    = avg + '%';
}

function updateTable(logs) {
    const tbody = document.getElementById('logTable');
    let hasNew  = false;

    logs.forEach(log => {
        if (!existing.has(log[0])) {
            existing.add(log[0]);
            allLogs.unshift(log);
            hasNew = true;
        }
    });

    allLogs.sort((a, b) => b[0] - a[0]);

    if (allLogs.length > MAX_ROWS) allLogs = allLogs.slice(0, MAX_ROWS);

    if (!hasNew && tbody.rows.length > 1) return;

    if (allLogs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty">Waiting for detections...</td></tr>';
        return;
    }

    tbody.innerHTML = allLogs.map((log, i) => `
        <tr class="${i === 0 && hasNew ? 'row-new' : ''}">
            <td class="td-time">${formatTime(log[1])}</td>
            <td class="td-source">${log[2]}</td>
            <td class="td-url">${log[3]}</td>
            <td><span class="badge ${badgeClass(log[4])}">${formatConf(log[4])}</span></td>
        </tr>
    `).join('');

    updateStats();
}

function updateLineChart() {
    const slice  = allLogs.slice(0, 15).reverse();
    const labels = slice.map(l => formatTime(l[1]));
    const data   = slice.map(l => {
        const n = parseFloat(l[4]);
        return n <= 1 ? n * 100 : n;
    });

    if (lineChart) lineChart.destroy();

    lineChart = new Chart(document.getElementById('lineChart'), {
        type: 'line',
        data: {
            labels,
            datasets: [{
                label: 'Confidence %',
                data,
                borderColor: '#38bdf8',
                backgroundColor: 'rgba(56,189,248,0.06)',
                pointBackgroundColor: '#38bdf8',
                pointBorderColor: '#060d1a',
                pointRadius: 4,
                pointHoverRadius: 6,
                tension: 0.4,
                fill: true
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: {
                    min: 0, max: 100,
                    ticks: { color: '#64748b', callback: v => v + '%' },
                    grid:  { color: 'rgba(56,189,248,0.05)' }
                },
                x: {
                    ticks: { color: '#64748b', maxRotation: 45, font: { size: 10 } },
                    grid:  { color: 'rgba(56,189,248,0.05)' }
                }
            }
        }
    });
}

function updateDoughnutChart() {
    const counts = {};
    allLogs.forEach(l => { counts[l[2]] = (counts[l[2]] || 0) + 1; });

    const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 6);
    const labels = sorted.map(e => e[0]);
    const data   = sorted.map(e => e[1]);

    if (doughnutChart) doughnutChart.destroy();

    doughnutChart = new Chart(document.getElementById('doughnutChart'), {
        type: 'doughnut',
        data: {
            labels,
            datasets: [{
                data,
                backgroundColor: ['#38bdf8','#06b6d4','#0891b2','#0e7490','#155e75','#164e63'],
                borderColor: '#0d1b2e',
                borderWidth: 3,
                hoverOffset: 6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '60%',
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        color: '#94a3b8',
                        font: { size: 11, family: "'JetBrains Mono', monospace" },
                        padding: 12,
                        usePointStyle: true,
                        pointStyleWidth: 8
                    }
                }
            }
        }
    });
}

async function refresh() {
    const logs = await fetchLogs();
    if (logs.length > 0) {
        updateTable(logs);
        updateLineChart();
        updateDoughnutChart();
    }
}

setInterval(refresh, 3000);
refresh();
</script>

<script>
const _W = () => window.innerWidth;
const _H = () => window.innerHeight;

function _resize(c) { c.width = _W(); c.height = _H(); }

const _c1 = document.getElementById('c1');
const _c2 = document.getElementById('c2');
const _c3 = document.getElementById('c3');
const _c4 = document.getElementById('c4');
[_c1,_c2,_c3,_c4].forEach(_resize);
window.addEventListener('resize', () => [_c1,_c2,_c3,_c4].forEach(_resize));

const _x1 = _c1.getContext('2d');
const _x2 = _c2.getContext('2d');
const _x3 = _c3.getContext('2d');
const _x4 = _c4.getContext('2d');

let _t = 0;

function drawHexGrid() {
    _x1.clearRect(0, 0, _W(), _H());
    const size = 38;
    const w2   = size * 2;
    const h2   = Math.sqrt(3) * size;
    const cols = Math.ceil(_W() / (w2 * 0.75)) + 2;
    const rows = Math.ceil(_H() / h2) + 2;

    for (let row = -1; row < rows; row++) {
        for (let col = -1; col < cols; col++) {
            const cx = col * w2 * 0.75;
            const cy = row * h2 + (col % 2 === 0 ? 0 : h2 / 2);
            const dist  = Math.sqrt((cx - _W()*0.5)**2 + (cy - _H()*0.5)**2);
            const wave  = Math.sin(dist * 0.012 - _t * 1.4) * 0.5 + 0.5;
            const wave2 = Math.sin(dist * 0.008 + _t * 0.9 + col * 0.3) * 0.5 + 0.5;
            const alpha = wave * 0.18 + wave2 * 0.08;
            const g = Math.floor(wave * 180 + 60);
            const b = Math.floor(wave2 * 80 + 180);

            _x1.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = Math.PI / 180 * (60 * i - 30);
                const px = cx + size * Math.cos(angle);
                const py = cy + size * Math.sin(angle);
                i === 0 ? _x1.moveTo(px, py) : _x1.lineTo(px, py);
            }
            _x1.closePath();
            _x1.strokeStyle = `rgba(0,${g},${b},${alpha})`;
            _x1.lineWidth = 0.8;
            _x1.stroke();

            if (wave > 0.85 && wave2 > 0.75) {
                _x1.fillStyle = `rgba(0,${g},${b},0.04)`;
                _x1.fill();
            }
        }
    }
}

const RIVERS = [];
for (let i = 0; i < 18; i++) {
    const side = Math.floor(Math.random() * 4);
    let sx, sy, ex, ey;
    const rw = _W(), rh = _H();
    if (side === 0)      { sx = Math.random()*rw; sy = 0; }
    else if (side === 1) { sx = rw; sy = Math.random()*rh; }
    else if (side === 2) { sx = Math.random()*rw; sy = rh; }
    else                 { sx = 0; sy = Math.random()*rh; }
    const eSide = (side + 2) % 4;
    if (eSide === 0)      { ex = Math.random()*rw; ey = 0; }
    else if (eSide === 1) { ex = rw; ey = Math.random()*rh; }
    else if (eSide === 2) { ex = Math.random()*rw; ey = rh; }
    else                  { ex = 0; ey = Math.random()*rh; }
    RIVERS.push({
        sx, sy, ex, ey,
        cp1x: Math.random()*rw, cp1y: Math.random()*rh,
        cp2x: Math.random()*rw, cp2y: Math.random()*rh,
        speed: 0.002 + Math.random() * 0.003,
        progress: Math.random(),
        color: Math.random() > 0.5 ? [0,220,255] : [0,255,160],
        width: 0.4 + Math.random() * 0.8,
        tailLen: 0.08 + Math.random() * 0.12
    });
}

function _cubic(t, p0, p1, p2, p3) {
    const u = 1 - t;
    return u*u*u*p0 + 3*u*u*t*p1 + 3*u*t*t*p2 + t*t*t*p3;
}

function drawRivers() {
    _x2.clearRect(0, 0, _W(), _H());
    RIVERS.forEach(r => {
        r.progress += r.speed;
        if (r.progress > 1 + r.tailLen) r.progress = -r.tailLen;
        const start = Math.max(0, r.progress - r.tailLen);
        const end   = Math.min(1, r.progress);
        if (start >= end) return;
        for (let s = 0; s <= 120; s++) {
            const frac = s / 120;
            const pt   = start + frac * (end - start);
            if (pt < 0 || pt > 1) continue;
            const px = _cubic(pt, r.sx, r.cp1x, r.cp2x, r.ex);
            const py = _cubic(pt, r.sy, r.cp1y, r.cp2y, r.ey);
            const bright = (pt - start) / (end - start);
            const alpha  = bright * bright * 0.9;
            _x2.beginPath();
            _x2.arc(px, py, r.width * (0.5 + bright * 0.5), 0, Math.PI*2);
            _x2.fillStyle = `rgba(${r.color[0]},${r.color[1]},${r.color[2]},${alpha})`;
            _x2.fill();
        }
        const hx = _cubic(Math.min(r.progress,1), r.sx, r.cp1x, r.cp2x, r.ex);
        const hy = _cubic(Math.min(r.progress,1), r.sy, r.cp1y, r.cp2y, r.ey);
        const grad = _x2.createRadialGradient(hx, hy, 0, hx, hy, 8);
        grad.addColorStop(0, `rgba(${r.color[0]},${r.color[1]},${r.color[2]},0.9)`);
        grad.addColorStop(1, `rgba(${r.color[0]},${r.color[1]},${r.color[2]},0)`);
        _x2.beginPath();
        _x2.arc(hx, hy, 8, 0, Math.PI*2);
        _x2.fillStyle = grad;
        _x2.fill();
    });
}

const ORB_COLORS = [[0,180,255],[0,255,180],[20,100,255],[0,255,120],[0,140,220]];
const ORBS = Array.from({length: 6}, (_, i) => ({
    x: Math.random() * _W(),
    y: Math.random() * _H(),
    r: 120 + Math.random() * 200,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    color: ORB_COLORS[i % ORB_COLORS.length],
    phase: Math.random() * Math.PI * 2,
    phaseSpeed: 0.005 + Math.random() * 0.008
}));

function drawOrbs() {
    _x3.clearRect(0, 0, _W(), _H());
    ORBS.forEach(o => {
        o.phase += o.phaseSpeed;
        o.x += o.vx + Math.sin(o.phase * 0.7) * 0.15;
        o.y += o.vy + Math.cos(o.phase * 0.5) * 0.15;
        if (o.x < -o.r) o.x = _W() + o.r;
        if (o.x > _W() + o.r) o.x = -o.r;
        if (o.y < -o.r) o.y = _H() + o.r;
        if (o.y > _H() + o.r) o.y = -o.r;
        const breathe = 0.9 + Math.sin(o.phase) * 0.1;
        const cr    = o.r * breathe;
        const alpha = 0.03 + Math.sin(o.phase * 0.6) * 0.015;
        const grad  = _x3.createRadialGradient(o.x, o.y, 0, o.x, o.y, cr);
        grad.addColorStop(0,   `rgba(${o.color[0]},${o.color[1]},${o.color[2]},${alpha * 2.5})`);
        grad.addColorStop(0.4, `rgba(${o.color[0]},${o.color[1]},${o.color[2]},${alpha})`);
        grad.addColorStop(1,   `rgba(${o.color[0]},${o.color[1]},${o.color[2]},0)`);
        _x3.beginPath();
        _x3.arc(o.x, o.y, cr, 0, Math.PI*2);

}

function drawOverlay() {

}

function bgLoop() {

    drawHexGrid();
    drawRivers();
    drawOrbs();

drawOverlay();
